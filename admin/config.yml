backend:
  name: github
  repo: LionSunRevolution2026/FreeIran-Sources
  branch: main

media_folder: ""
public_folder: ""

collections:

  - name: "resources"
    label: "Resources"
    folder: "data"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "json"

    fields:

      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Description"
        name: "description"
        widget: "text"

      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - document
          - video
          - image

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - reports
          - testimonies
          - legal
          - protests
          - repression
          - speeches
          - victims
          - evidence
          - statistics
          - timelines

      - label: "Upload File"
        name: "file"
        widget: "file"

      - label: "Thumbnail"
        name: "thumbnail"
        widget: "image"
        required: false
